<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Resolution Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pinOverlay" class="overlay">
    <div class="pin-box">
        <h2>Enter Access Code</h2>
        <input type="password" id="pinInput" maxlength="4" placeholder="****" inputmode="numeric">
        <button onclick="checkPin()">Enter</button>
        <p id="pinError" style="color: red; display: none;">Incorrect Code</p>
    </div>
</div>

    <div class="container">
        <header>
            <h1>Resolution Tracker</h1>
            <p>A space for growth and solutions.</p>
        </header>

        <section class="form-section">
            <form id="resolutionForm">
                <div class="input-group">
                    <label for="issue">The Concern/Complaint</label>
                    <textarea id="issue" placeholder="What is on your mind?" required></textarea>
                </div>

                <div class="input-group">
                    <label for="steps">Immediate Steps for Resolution</label>
                    <textarea id="steps" placeholder="What can we do right now?" required></textarea>
                </div>

                <div class="input-group">
                    <label for="futurePlan">Future Growth Plan</label>
                    <textarea id="futurePlan" placeholder="How do we prevent this or grow from it?" required></textarea>
                </div>

                <button type="submit" id="submitBtn">Log Resolution</button>
            </form>
        </section>

        <hr>

              <div class="search-container">
                  <input type="text" id="searchInput" placeholder="Search by keyword (e.g. 'finance', 'dinner')..." onkeyup="filterEntries()">
              </div>

        <section id="entriesList">
            <h2>Our Journey</h2>
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
