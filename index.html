<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Resolution Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pinOverlay" class="overlay">
    <div class="pin-box">
        <h2>Enter Access Code</h2>
        <input type="password" id="pinInput" maxlength="4" placeholder="****" inputmode="numeric">
        <button onclick="checkPin()">Enter</button>
        <p id="pinError" style="color: red; display: none;">Incorrect Code</p>
    </div>
</div>

    <div class="container">
        <header>
            <h1>Resolution Tracker</h1>
            <p>A space for growth and solutions.</p>
        </header>

        <section class="form-section">
    <form id="issueForm">
        <div class="input-group">
            <label for="issue">The Concern (Wife's Entry)</label>
            <textarea id="issue" placeholder="What is on your mind?" required></textarea>
        </div>
        <button type="submit">Send to Spouse</button>
    </form>
</section>

<div id="responseModal" class="overlay" style="display:none;">
    <div class="pin-box" style="width: 80%; max-width: 500px;">
        <h3>Add Your Resolution</h3>
        <div class="input-group">
            <label>Immediate Steps</label>
            <textarea id="modalSteps" placeholder="What can we do now?"></textarea>
        </div>
        <div class="input-group">
            <label>Future Growth Plan</label>
            <textarea id="modalFuture" placeholder="How do we grow?"></textarea>
        </div>
        <input type="hidden" id="editingIndex">
        <button onclick="saveResponse()">Save Resolution</button>
        <button onclick="closeModal()" style="background:#ccc; margin-top:5px;">Cancel</button>
    </div>
</div>

        <hr>

              <div class="search-container">
                  <input type="text" id="searchInput" placeholder="Search by keyword (e.g. 'finance', 'dinner')..." onkeyup="filterEntries()">
              </div>

        <section id="entriesList">
            <h2>Our Journey</h2>
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
